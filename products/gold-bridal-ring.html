<!doctype html>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>

      };

    <link rel="stylesheet" href="../styles.css" />

  <body class="bg-ivory font-sans text-noir antialiased">
    <main class="min-h-screen bg-porcelain">
      <header class="bg-obsidian px-5 py-5 text-ivory md:px-8">

              <span class="rounded-full border border-champagne/30 bg-white px-5 py-3">Premium Finish</span>
